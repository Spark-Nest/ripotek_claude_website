<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="88 88 224 244" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradRTop1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D9488;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="gradRTop2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D9488;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Isometric cube - larger and bolder -->
  <!-- Top face with R -->
  <path d="M 200 100 L 300 155 L 200 210 L 100 155 Z" 
        fill="#5EEAD4" stroke="#0D9488" stroke-width="4"/>
  
  <!-- Right face -->
  <path d="M 300 155 L 300 265 L 200 320 L 200 210 Z" 
        fill="url(#gradRTop1)" stroke="#0D9488" stroke-width="4"/>
  
  <!-- Left face -->
  <path d="M 100 155 L 100 265 L 200 320 L 200 210 Z" 
        fill="url(#gradRTop2)" stroke="#0D9488" stroke-width="4"/>
  
  <!-- Bold "R" on top face -->
  <g transform="translate(200, 155) scale(0.7) translate(-50, -55)">
    <!-- R stem -->
    <rect x="15" y="10" width="20" height="90" rx="3" fill="#FFFFFF"/>
    
    <!-- R top curve -->
    <path d="M 35 10 Q 80 10 80 40 Q 80 60 65 65 L 40 65" 
          fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round"/>
    
    <!-- R diagonal leg -->
    <line x1="55" y1="65" x2="80" y2="100" 
          stroke="#FFFFFF" stroke-width="20" stroke-linecap="round"/>
    
    <!-- Small accent dot -->
    <circle cx="80" cy="40" r="6" fill="#1E293B"/>
  </g>
  
  <!-- Data layer lines on sides (subtle) -->
  <line x1="300" y1="180" x2="200" y2="235" stroke="#2DD4BF" stroke-width="2" opacity="0.4"/>
  <line x1="300" y1="205" x2="200" y2="260" stroke="#2DD4BF" stroke-width="2" opacity="0.4"/>
  <line x1="300" y1="230" x2="200" y2="285" stroke="#2DD4BF" stroke-width="2" opacity="0.4"/>
  
  <line x1="100" y1="180" x2="200" y2="235" stroke="#2DD4BF" stroke-width="2" opacity="0.4"/>
  <line x1="100" y1="205" x2="200" y2="260" stroke="#2DD4BF" stroke-width="2" opacity="0.4"/>
  <line x1="100" y1="230" x2="200" y2="285" stroke="#2DD4BF" stroke-width="2" opacity="0.4"/>
</svg>